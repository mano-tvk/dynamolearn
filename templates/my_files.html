<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Files | Dynamo Growth Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <h1 class="app-title">My Uploaded Files 📂</h1>
        </div>
        <div class="top-bar-right">
            <a href="/dashboard"><button class="secondary-btn">Back to Dashboard</button></a>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="card full-width">
            {% if files %}
                <table>
                    <tr>
                        <th>File Name</th>
                        <th>Upload Time</th>
                        <th>Action</th>
                    </tr>
                    {% for file in files %}
                    <tr>
                        <td>{{ file[1] }}</td>
                        <td>{{ file[2] }}</td>
                        <td>
                            <a href="/uploads/{{ session['user'] }}/{{ file[1] }}" target="_blank">Open</a> |
                            <a href="/delete_file/{{ file[0] }}" onclick="return confirm('Delete this file?');">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </table>
            {% else %}
                <p>No files uploaded yet.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
