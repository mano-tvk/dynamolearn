<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Files | Dynamo Growth Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <h1 class="app-title">All Uploaded Files</h1>
            <p class="top-tagline">Review and manage member uploads.</p>
        </div>
        <div class="top-bar-right">
            <a href="/admin"><button class="secondary-btn">Back to Admin Dashboard</button></a>
            <a href="/logout"><button class="secondary-btn">Logout</button></a>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="card full-width">
            {% if files %}
                <table>
                    <tr>
                        <th>Member</th>
                        <th>File</th>
                        <th>Upload Time</th>
                        <th>Action</th>
                    </tr>
                    {% for f in files %}
                    <tr>
                        <td>{{ f[1] }}</td>
                        <td>{{ f[2] }}</td>
                        <td>{{ f[3] }}</td>
                        <td>
                            <a href="/uploads/{{ f[1] }}/{{ f[2] }}" target="_blank">Open</a> |
                            <a href="/admin_delete/{{ f[0] }}" onclick="return confirm('Delete this file?');">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </table>
            {% else %}
                <p>No files uploaded yet.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
